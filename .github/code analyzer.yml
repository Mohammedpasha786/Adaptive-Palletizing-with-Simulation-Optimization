name: MATLAB Code Analyzer

# Runs MATLAB's Code Analyzer (checkcode) across src/ to catch style and
# correctness issues on every push and pull request targeting main or develop.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Run Code Analyzer report
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath('src'));
            files = dir(fullfile('src', '**', '*.m'));
            issues = struct([]);
            for k = 1:numel(files)
              f = fullfile(files(k).folder, files(k).name);
              r = checkcode(f, '-id', '-struct');
              for j = 1:numel(r)
                r(j).file = f;
              end
              issues = [issues, r]; %#ok<AGROW>
            end
            if isempty(issues)
              disp('Code Analyzer: no issues found.');
            else
              for k = 1:numel(issues)
                fprintf('%s:%d [%s] %s\n', issues(k).file, ...
                  issues(k).line(1), issues(k).id, issues(k).message);
              end
              warning('Code Analyzer found %d issue(s).', numel(issues));
            end
